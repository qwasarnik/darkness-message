<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Darkness - Чат</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .record-btn {
      background: #ff3b30 !important;
      color: white !important;
    }
    .record-btn.recording {
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    .empty-message {
      text-align: center;
      color: #888;
      padding: 20px;
      font-size: 14px;
    }
    .unread-badge {
      background: #2b6ef0;
      color: white;
      border-radius: 50%;
      min-width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      margin-left: 8px;
      padding: 0 4px;
    }
    .chat-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid #2a2a2a;
      cursor: pointer;
    }
    .chat-item:hover {
      background: #2a2a2a;
    }
    .chat-item .last-message {
      font-size: 13px;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 150px;
    }
    .chat-item .time {
      font-size: 11px;
      color: #666;
      margin-left: auto;
    }
  </style>
</head>
<body>
  <!-- Немедленное открытие боковой панели на мобильных -->
  <script>
    (function() {
      if (window.innerWidth <= 768) {
        document.addEventListener('DOMContentLoaded', function() {
          var sidebar = document.getElementById('sidebar');
          if (sidebar) sidebar.classList.add('show');
        });
      }
    })();
  </script>
  <div class="chat-app">
    <!-- Боковая панель -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Darkness</h2>
        <div class="header-buttons">
          <button class="profile-btn" onclick="showProfileModal()">👤</button>
          <button class="logout-btn" onclick="logout()">⏻</button>
        </div>
      </div>
      <div class="tabs">
        <div class="tab" onclick="switchTab('chats')" id="tabChats">Чаты</div>
        <div class="tab active" onclick="switchTab('users')" id="tabUsers">Контакты</div>
        <div class="tab" onclick="switchTab('groups')" id="tabGroups">Группы</div>
      </div>
      <!-- Для чатов поиск не нужен? Оставим поле только для контактов, а для чатов оно будет скрыто -->
      <div class="search-box" id="searchBox">
        <input type="text" id="searchInput" placeholder="Поиск по никнейму..." oninput="search()">
      </div>
      <div class="chats-list" id="chatsList" style="display: none;"></div>
      <div class="users-list" id="usersList" style="display: block;"></div>
      <div class="groups-list" id="groupsList" style="display: none;">
        <div style="padding: 12px;">
          <button onclick="showCreateGroupModal()" style="width:100%; padding:10px; background:#2b6ef0; border:none; border-radius:8px; color:white;">➕ Создать группу</button>
        </div>
        <div id="groupsContainer"></div>
      </div>
    </div>

    <!-- Основная область чата -->
    <div class="chat-area">
      <div class="chat-header" id="chatHeader" style="display: none;">
        <button class="back-btn" onclick="toggleSidebar()">←</button>
        <img class="user-avatar-img" id="chatAvatarImg" src="" style="display: none;">
        <div class="user-avatar" id="chatAvatarPlaceholder" style="display: flex;"></div>
        <div class="user-info">
          <div class="user-name" id="chatUsername"></div>
          <div class="user-bio" id="chatBio"></div>
        </div>
      </div>
      <div class="chat-messages" id="messages"></div>
      <div class="chat-input-area" id="chatInputArea" style="display: none;">
        <input type="text" id="messageInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
        <div class="attach-menu">
          <button onclick="toggleAttachMenu()">📎</button>
          <div class="attach-options" id="attachMenu">
            <button onclick="sendPhoto()">📷 Фото</button>
            <button onclick="sendVideo()">🎥 Видео</button>
            <button onclick="startRecording()" id="recordBtn">⏺ Кружок</button>
          </div>
        </div>
        <button onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>

  <!-- Модальные окна (без изменений) -->
  <!-- ... -->

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ========== Глобальные переменные ==========
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    let socket;
    let currentChat = null; // { type: 'user' или 'group', id, name }
    let currentChatType = null;
    let mediaRecorder;
    let recordedChunks = [];
    let mediaStream = null;

    if (!token || !user.id) window.location.href = '/login.html';

    // Запрос разрешения на уведомления
    if ('Notification' in window && Notification.permission !== 'granted' && Notification.permission !== 'denied') {
      Notification.requestPermission();
    }

    // ========== Инициализация Socket ==========
    function initSocket() {
      socket = io({ auth: { token } });
      socket.on('connect', () => console.log('Socket connected'));
      
      socket.on('private message', (msg) => {
        // Если открыт чат с этим пользователем, показываем сообщение и помечаем прочитанным
        if (currentChat && currentChatType === 'user' && (msg.from === currentChat.id || msg.to === currentChat.id)) {
          displayMessage(msg, 'user');
          // Помечаем как прочитанные, если сообщение от другого
          if (msg.from !== user.id) {
            markMessagesRead(msg.from);
          }
        } else {
          // Иначе обновляем список чатов и показываем уведомление
          if (msg.from !== user.id) {
            // Показываем уведомление
            showNotification(msg);
            // Обновляем список чатов, если он открыт
            if (document.getElementById('tabChats').classList.contains('active')) {
              loadChats();
            } else {
              // Можно также обновить, но пока не нужно
            }
          }
        }
      });

      socket.on('group message', (msg) => {
        if (currentChat && currentChatType === 'group' && msg.groupId === currentChat.id) {
          displayGroupMessage(msg);
        } else {
          // Для групп уведомления пока не делаем (можно добавить)
        }
      });

      socket.on('error', alert);
    }

    // Показать уведомление
    function showNotification(msg) {
      if ('Notification' in window && Notification.permission === 'granted') {
        // Если документ не активен (пользователь на другой вкладке)
        if (document.hidden) {
          const sender = msg.fromUser ? msg.fromUser.username : 'Кто-то';
          const body = msg.text || (msg.mediaUrl ? (msg.type === 'image' ? '📷 Фото' : msg.type === 'video' ? '🎥 Видео' : '📹 Кружок') : 'Сообщение');
          new Notification(`Darkness: ${sender}`, { body });
        }
      }
    }

    // Пометить сообщения от пользователя как прочитанные
    async function markMessagesRead(fromUserId) {
      await fetch('/api/messages/read', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ fromUserId })
      });
      // Если открыта вкладка чатов, обновить список
      if (document.getElementById('tabChats').classList.contains('active')) {
        loadChats();
      }
    }

    // ========== Переключение вкладок ==========
    function switchTab(tab) {
      document.getElementById('tabChats').classList.toggle('active', tab === 'chats');
      document.getElementById('tabUsers').classList.toggle('active', tab === 'users');
      document.getElementById('tabGroups').classList.toggle('active', tab === 'groups');
      
      document.getElementById('chatsList').style.display = tab === 'chats' ? 'block' : 'none';
      document.getElementById('usersList').style.display = tab === 'users' ? 'block' : 'none';
      document.getElementById('groupsList').style.display = tab === 'groups' ? 'block' : 'none';
      
      // Поле поиска показываем только для контактов
      document.getElementById('searchBox').style.display = tab === 'users' ? 'block' : 'none';
      
      if (tab === 'chats') loadChats();
      else if (tab === 'groups') loadGroups();
      else {
        // При переходе на контакты очищаем поиск и список
        document.getElementById('searchInput').value = '';
        renderUsers([]);
      }
    }

    // ========== Загрузка чатов ==========
    async function loadChats() {
      const res = await fetch('/api/chats', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const chats = await res.json();
      renderChats(chats);
    }

    function renderChats(chats) {
      const container = document.getElementById('chatsList');
      container.innerHTML = '';
      if (chats.length === 0) {
        const emptyDiv = document.createElement('div');
        emptyDiv.className = 'empty-message';
        emptyDiv.innerText = 'У вас пока нет чатов. Начните общение с поиска контакта.';
        container.appendChild(emptyDiv);
        return;
      }
      chats.forEach(chat => {
        const div = document.createElement('div');
        div.className = 'chat-item';
        div.dataset.id = chat.userId;
        div.dataset.username = chat.username;
        div.onclick = () => selectUser(chat.userId, chat.username);
        
        let avatarHtml = '';
        if (chat.avatar) {
          avatarHtml = `<img src="${chat.avatar}" class="user-avatar-img">`;
        } else {
          avatarHtml = `<div class="user-avatar">${chat.username.charAt(0).toUpperCase()}</div>`;
        }
        
        const time = chat.lastMessageTime ? new Date(chat.lastMessageTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
        const unreadBadge = chat.unreadCount > 0 ? `<span class="unread-badge">${chat.unreadCount}</span>` : '';
        
        div.innerHTML = `
          ${avatarHtml}
          <div class="user-info">
            <div class="user-name">${escapeHtml(chat.username)}</div>
            <div class="last-message">${escapeHtml(chat.lastMessage)}</div>
          </div>
          <div class="time">${time}</div>
          ${unreadBadge}
        `;
        container.appendChild(div);
      });
    }

    // ========== Загрузка групп (без изменений) ==========
    async function loadGroups() {
      const res = await fetch('/api/groups', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const groups = await res.json();
      renderGroups(groups);
    }

    function renderGroups(groups) {
      const container = document.getElementById('groupsContainer');
      container.innerHTML = '';
      groups.forEach(g => {
        const div = document.createElement('div');
        div.className = 'group-item';
        div.dataset.id = g.id;
        div.dataset.name = g.name;
        div.onclick = () => selectGroup(g.id, g.name);
        div.innerHTML = `
          <div class="group-avatar">${g.name.charAt(0).toUpperCase()}</div>
          <div class="group-name">${escapeHtml(g.name)}</div>
        `;
        container.appendChild(div);
      });
    }

    // ========== Поиск пользователей ==========
    let searchTimeout;
    function search() {
      clearTimeout(searchTimeout);
      const query = document.getElementById('searchInput').value.trim();
      
      if (query === '') {
        renderUsers([]);
        return;
      }

      searchTimeout = setTimeout(async () => {
        const res = await fetch(`/api/users?search=${encodeURIComponent(query)}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const users = await res.json();
        renderUsers(users);
      }, 300);
    }

    function renderUsers(users) {
      const list = document.getElementById('usersList');
      list.innerHTML = '';
      
      if (users.length === 0) {
        const emptyDiv = document.createElement('div');
        emptyDiv.className = 'empty-message';
        emptyDiv.innerText = 'Никто не найден. Попробуйте другой никнейм.';
        list.appendChild(emptyDiv);
        return;
      }

      users.forEach(u => {
        if (u.id === user.id) return;
        const div = document.createElement('div');
        div.className = 'user-item';
        div.dataset.id = u.id;
        div.dataset.username = u.username;
        div.onclick = () => selectUser(u.id, u.username);
        
        let avatarHtml = '';
        if (u.avatar) {
          avatarHtml = `<img src="${u.avatar}" class="user-avatar-img">`;
        } else {
          avatarHtml = `<div class="user-avatar">${u.username.charAt(0).toUpperCase()}</div>`;
        }
        
        div.innerHTML = `
          ${avatarHtml}
          <div class="user-info">
            <div class="user-name">${escapeHtml(u.username)}</div>
            <div class="user-bio">${escapeHtml(u.bio || '')}</div>
          </div>
        `;
        list.appendChild(div);
      });
    }

    // ========== Выбор пользователя (из чата или поиска) ==========
    async function selectUser(userId, username) {
      currentChat = { id: userId, name: username };
      currentChatType = 'user';
      document.getElementById('chatHeader').style.display = 'flex';
      document.getElementById('chatInputArea').style.display = 'flex';
      document.getElementById('chatUsername').innerText = username;
      
      // Загружаем информацию о пользователе (био, аватар)
      const res = await fetch(`/api/users?search=${encodeURIComponent(username)}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const users = await res.json();
      const found = users.find(u => u.id === userId);
      if (found) {
        document.getElementById('chatBio').innerText = found.bio || '';
        if (found.avatar) {
          document.getElementById('chatAvatarImg').src = found.avatar;
          document.getElementById('chatAvatarImg').style.display = 'block';
          document.getElementById('chatAvatarPlaceholder').style.display = 'none';
        } else {
          document.getElementById('chatAvatarPlaceholder').innerText = username.charAt(0).toUpperCase();
          document.getElementById('chatAvatarPlaceholder').style.display = 'flex';
          document.getElementById('chatAvatarImg').style.display = 'none';
        }
      }

      if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('show');

      const messagesRes = await fetch(`/api/messages/${userId}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const messages = await messagesRes.json();
      renderMessages(messages, 'user');

      // Помечаем сообщения от этого пользователя как прочитанные
      await markMessagesRead(userId);
    }

    // ========== Выбор группы ==========
    async function selectGroup(groupId, groupName) {
      currentChat = { id: groupId, name: groupName };
      currentChatType = 'group';
      document.getElementById('chatHeader').style.display = 'flex';
      document.getElementById('chatInputArea').style.display = 'flex';
      document.getElementById('chatUsername').innerText = groupName;
      document.getElementById('chatBio').innerText = 'группа';
      document.getElementById('chatAvatarPlaceholder').innerText = groupName.charAt(0).toUpperCase();
      document.getElementById('chatAvatarPlaceholder').style.display = 'flex';
      document.getElementById('chatAvatarImg').style.display = 'none';

      if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('show');

      const messagesRes = await fetch(`/api/groups/${groupId}/messages`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const messages = await messagesRes.json();
      renderMessages(messages, 'group');
    }

    // ========== Отображение сообщений (без изменений) ==========
    function renderMessages(messages, type) {
      const container = document.getElementById('messages');
      container.innerHTML = '';
      messages.forEach(msg => {
        if (type === 'user') displayMessage(msg, 'user');
        else displayGroupMessage(msg);
      });
      container.scrollTop = container.scrollHeight;
    }

    function displayMessage(msg, type) {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `message ${msg.fromUserId === user.id ? 'own' : ''}`;

      let content = '';
      if (msg.fromUserId !== user.id && msg.fromUser) {
        content += `<div class="message-header">`;
        if (msg.fromUser.avatar) {
          content += `<img src="${msg.fromUser.avatar}" class="message-avatar">`;
        }
        content += `<span class="message-username">${escapeHtml(msg.fromUser.username)}</span>`;
        content += `</div>`;
      }
      if (msg.text) {
        content += `<div class="text">${escapeHtml(msg.text)}</div>`;
      }
      if (msg.mediaUrl) {
        if (msg.type === 'image') {
          content += `<img src="${msg.mediaUrl}" class="media" onclick="window.open(this.src)">`;
        } else if (msg.type === 'video') {
          content += `<video src="${msg.mediaUrl}" controls class="media"></video>`;
        } else if (msg.type === 'video_note') {
          content += `<video src="${msg.mediaUrl}" class="video-note" loop autoplay muted playsinline></video>`;
        }
      }
      content += `<div class="timestamp">${new Date(msg.timestamp).toLocaleTimeString()}</div>`;
      div.innerHTML = content;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function displayGroupMessage(msg) {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `message ${msg.fromUserId === user.id ? 'own' : ''}`;

      let content = '';
      if (msg.fromUserId !== user.id && msg.fromUser) {
        content += `<div class="message-header">`;
        if (msg.fromUser.avatar) {
          content += `<img src="${msg.fromUser.avatar}" class="message-avatar">`;
        }
        content += `<span class="message-username">${escapeHtml(msg.fromUser.username)}</span>`;
        content += `</div>`;
      }
      if (msg.text) {
        content += `<div class="text">${escapeHtml(msg.text)}</div>`;
      }
      if (msg.mediaUrl) {
        if (msg.type === 'image') {
          content += `<img src="${msg.mediaUrl}" class="media" onclick="window.open(this.src)">`;
        } else if (msg.type === 'video') {
          content += `<video src="${msg.mediaUrl}" controls class="media"></video>`;
        } else if (msg.type === 'video_note') {
          content += `<video src="${msg.mediaUrl}" class="video-note" loop autoplay muted playsinline></video>`;
        }
      }
      content += `<div class="timestamp">${new Date(msg.timestamp).toLocaleTimeString()}</div>`;
      div.innerHTML = content;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ========== Отправка сообщения ==========
    function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text || !currentChat) return;

      if (currentChatType === 'user') {
        socket.emit('private message', {
          to: currentChat.id,
          text,
          type: 'text'
        });
      } else {
        socket.emit('group message', {
          groupId: currentChat.id,
          text,
          type: 'text'
        });
      }
      input.value = '';
    }

    // ========== Отправка фото/видео ==========
    function sendPhoto() {
      document.getElementById('fileInput').accept = 'image/*';
      document.getElementById('fileInput').onchange = (e) => uploadFile(e.target.files[0], 'image');
      document.getElementById('fileInput').click();
      toggleAttachMenu();
    }

    function sendVideo() {
      document.getElementById('fileInput').accept = 'video/*';
      document.getElementById('fileInput').onchange = (e) => uploadFile(e.target.files[0], 'video');
      document.getElementById('fileInput').click();
      toggleAttachMenu();
    }

    async function uploadFile(file, type) {
      if (!file) return;
      const formData = new FormData();
      formData.append('file', file);
      const res = await fetch('/api/upload', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
        body: formData
      });
      const data = await res.json();
      if (res.ok) {
        if (currentChatType === 'user') {
          socket.emit('private message', {
            to: currentChat.id,
            mediaUrl: data.url,
            type
          });
        } else {
          socket.emit('group message', {
            groupId: currentChat.id,
            mediaUrl: data.url,
            type
          });
        }
      } else {
        alert('Ошибка загрузки файла');
      }
    }

    // ========== Запись кружков ==========
    async function startRecording() {
      if (!currentChat) return;
      toggleAttachMenu();
      try {
        if (!mediaStream) {
          mediaStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        }
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(mediaStream, { mimeType: 'video/webm' });
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = async () => {
          const blob = new Blob(recordedChunks, { type: 'video/webm' });
          const formData = new FormData();
          formData.append('file', blob, 'video_note.webm');
          const res = await fetch('/api/upload', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` },
            body: formData
          });
          const data = await res.json();
          if (res.ok) {
            if (currentChatType === 'user') {
              socket.emit('private message', {
                to: currentChat.id,
                mediaUrl: data.url,
                type: 'video_note'
              });
            } else {
              socket.emit('group message', {
                groupId: currentChat.id,
                mediaUrl: data.url,
                type: 'video_note'
              });
            }
          } else {
            alert('Ошибка загрузки кружка');
          }
          mediaStream.getTracks().forEach(track => track.stop());
          mediaStream = null;
          document.getElementById('recordBtn').classList.remove('recording');
          document.getElementById('recordBtn').innerText = '⏺ Кружок';
        };
        mediaRecorder.start();
        document.getElementById('recordBtn').classList.add('recording');
        document.getElementById('recordBtn').innerText = '⏹ Остановить';
        document.getElementById('recordBtn').onclick = stopRecording;
        setTimeout(() => { if (mediaRecorder && mediaRecorder.state === 'recording') stopRecording(); }, 10000);
      } catch (err) {
        alert('Не удалось получить доступ к камере/микрофону');
        console.error(err);
      }
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
      document.getElementById('recordBtn').onclick = startRecording;
    }

    // ========== Профиль (без изменений) ==========
    function showProfileModal() { /* ... */ }
    function hideProfileModal() { /* ... */ }
    function uploadAvatar() { /* ... */ }
    async function saveProfile() { /* ... */ }

    // ========== Создание группы (без изменений) ==========
    function showCreateGroupModal() { /* ... */ }
    function hideCreateGroupModal() { /* ... */ }
    async function loadAllUsersForGroup() { /* ... */ }
    async function createGroup() { /* ... */ }

    // ========== Управление меню вложений ==========
    function toggleAttachMenu() {
      document.getElementById('attachMenu').classList.toggle('show');
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('show');
    }

    function logout() {
      localStorage.clear();
      window.location.href = '/login.html';
    }

    // Закрытие модалок по клику вне
    window.onclick = (e) => {
      if (e.target.classList.contains('modal')) {
        e.target.classList.remove('show');
      }
    };

    window.onload = () => {
      initSocket();
      // Показываем вкладку чатов по умолчанию
      switchTab('chats');
      // Для мобильных устройств показываем боковую панель сразу
      if (window.innerWidth <= 768) {
        document.getElementById('sidebar').classList.add('show');
      }
    };
